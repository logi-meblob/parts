<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produktów - Części</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-active { overflow: hidden; }
        .product-img { width: 100%; height: auto; max-height: 400px; object-fit: contain; border-radius: 12px; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 text-slate-800 font-sans">

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-3xl shadow-sm mb-6 border border-slate-200 gap-4">
            <div>
                <h1 class="text-2xl font-black text-slate-900">Katalog Produktów</h1>
                <div id="statusInfo" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-1 bg-blue-50 px-3 py-1 rounded-full inline-block">
                    Wczytywanie...
                </div>
            </div>
            <div class="w-full md:w-64">
                <input type="text" id="searchInput" oninput="filterTable()" placeholder="Szukaj SKU lub nazwy..." 
                    class="w-full border border-slate-200 p-3 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 transition">
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/50 border-b border-slate-100 text-[11px] uppercase font-black text-slate-400 tracking-wider">
                        <th class="p-5 cursor-pointer hover:text-blue-600 transition" onclick="sortBySKU()">
                            SKU <span id="sortIcon">↕</span>
                        </th>
                        <th class="p-5">Nazwa produktu</th>
                        <th class="p-5 text-center w-24">Podgląd</th>
                    </tr>
                </thead>
                <tbody id="productTable" class="divide-y divide-slate-50">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-50 p-4" onclick="if(event.target == this) closeModal()">
        <div class="bg-white w-full max-w-lg rounded-[40px] p-8 relative shadow-2xl">
            <button class="absolute top-6 right-8 text-4xl font-light text-slate-300 hover:text-slate-600 transition" onclick="closeModal()">&times;</button>
            
            <div id="modalContent" class="text-center">
                <div class="bg-slate-100 rounded-3xl p-4 mb-6">
                    <img id="mImg" src="" alt="Produkt" class="product-img mx-auto shadow-sm">
                </div>
                <h2 id="mSku" class="text-sm font-black text-blue-600 uppercase tracking-widest mb-2"></h2>
                <h3 id="mName" class="text-2xl font-bold text-slate-900 leading-tight"></h3>
            </div>
        </div>
    </div>

    <script>
        const CSV_FILE = "produkty.csv"; 
        const FOTO_PATH = "foto/";       
        let rawData = []; 
        let skuAsc = true; // Kierunek sortowania

        async function init() {
            const status = document.getElementById('statusInfo');
            try {
                const response = await fetch(CSV_FILE + '?v=' + Date.now());
                if (!response.ok) throw new Error("Nie znaleziono pliku " + CSV_FILE);
                
                const text = await response.text();
                rawData = parseCSV(text);
                
                render(rawData);
                
                status.innerText = "Ilość pozycji: " + rawData.length;
                status.classList.replace('text-blue-600', 'text-green-600');
                status.classList.replace('bg-blue-50', 'bg-green-50');
            } catch (err) {
                status.innerText = "BŁĄD: " + err.message;
                status.classList.replace('bg-blue-50', 'bg-red-50');
                status.classList.replace('text-blue-600', 'text-red-600');
            }
        }

        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
            if (lines.length === 0) return [];
            const headers = lines[0].split(';').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(';').map(v => v.trim());
                let obj = {};
                headers.forEach((header, i) => obj[header] = values[i]);
                return obj;
            });
        }

        // FUNKCJA SORTOWANIA
        function sortBySKU() {
            skuAsc = !skuAsc;
            document.getElementById('sortIcon').innerText = skuAsc ? "↑" : "↓";
            
            rawData.sort((a, b) => {
                const skuA = (a.SKU || "").toString().toLowerCase();
                const skuB = (b.SKU || "").toString().toLowerCase();
                
                // Używamy localeCompare dla poprawnego sortowania tekstowo-liczbowego
                return skuAsc 
                    ? skuA.localeCompare(skuB, undefined, {numeric: true}) 
                    : skuB.localeCompare(skuA, undefined, {numeric: true});
            });
            
            filterTable(); // Wywołujemy filtr, aby odświeżyć tabelę z zachowaniem wyszukiwania
        }

        function render(data) {
            const tbody = document.getElementById('productTable');
            tbody.innerHTML = data.map(p => `
                <tr class="hover:bg-blue-50/30 transition-colors group">
                    <td class="p-5 font-mono text-sm font-bold text-slate-500">${p.SKU || '---'}</td>
                    <td class="p-5 font-semibold text-slate-800">${p.Nazwa || 'Brak nazwy'}</td>
                    <td class="p-5 text-center">
                        <button onclick="openModal('${p.SKU}')" 
                            class="w-10 h-10 rounded-xl bg-slate-100 text-slate-400 group-hover:bg-blue-600 group-hover:text-white transition-all flex items-center justify-center mx-auto shadow-sm">
                            🔍
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function filterTable() {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            const filtered = rawData.filter(p => {
                const skuMatch = (p.SKU || '').toLowerCase().includes(txt);
                const nameMatch = (p.Nazwa || '').toLowerCase().includes(txt);
                return skuMatch || nameMatch;
            });
            render(filtered);
        }

        function openModal(sku) {
            const p = rawData.find(x => x.SKU === sku);
            if(!p) return;
            document.getElementById('mSku').innerText = p.SKU;
            document.getElementById('mName').innerText = p.Nazwa;
            const img = document.getElementById('mImg');
            img.src = `${FOTO_PATH}${p.SKU}.jpg`;
            img.onerror = function() {
                this.onerror = null;
                this.src = 'https://placehold.co/400x400/f1f5f9/64748b?text=Brak+zdjęcia';
            };
            document.getElementById('modal').style.display = 'flex';
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.classList.remove('modal-active');
        }

        window.onload = init;
    </script>
</body>
</html>
